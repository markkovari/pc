apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: petclinic
  annotations:
    description: "wasmCloud 2.0 PetClinic — DDD, Event-Sourced, WIT-First"
    version: "0.1.10"
spec:
  components:

    # ── API Gateway ────────────────────────────────────────────────────────────
    - name: api-gateway
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/api-gateway:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 3
        - type: link
          properties:
            target: event-store
            namespace: petclinic
            package: store
            interfaces: [event-store]
        - type: link
          properties:
            target: owner-aggregate
            namespace: petclinic
            package: owner-aggregate
            interfaces: [owner-aggregate]
        - type: link
          properties:
            target: pet-aggregate
            namespace: petclinic
            package: pet-aggregate
            interfaces: [pet-aggregate]
        - type: link
          properties:
            target: vet-aggregate
            namespace: petclinic
            package: vet-aggregate
            interfaces: [vet-aggregate]
        - type: link
          properties:
            target: query-handler
            namespace: petclinic
            package: gateway
            interfaces: [api]

    # ── Owner Aggregate ────────────────────────────────────────────────────────
    - name: owner-aggregate
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/owner-aggregate:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 2

    # ── Pet Aggregate ──────────────────────────────────────────────────────────
    - name: pet-aggregate
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/pet-aggregate:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 2

    # ── Vet Aggregate ──────────────────────────────────────────────────────────
    - name: vet-aggregate
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/vet-aggregate:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 2

    # ── Event Store ────────────────────────────────────────────────────────────
    - name: event-store
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/event-store:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 2
        - type: link
          properties:
            target: keyvalue-nats
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target_config:
              - name: events-bucket-config
                properties:
                  bucket: petclinic-events
                  cluster_uri: "nats://nats.wasmcloud.svc.cluster.local:4222"
        - type: link
          properties:
            target: messaging-nats
            namespace: wasmcloud
            package: messaging
            interfaces: [consumer]

    # ── Owner Projector ────────────────────────────────────────────────────────
    - name: owner-projector
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/owner-projector:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            target: keyvalue-nats
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target_config:
              - name: owner-projector-views-config
                properties:
                  bucket: petclinic-views
                  cluster_uri: "nats://nats.wasmcloud.svc.cluster.local:4222"
        - type: link
          properties:
            target: event-store
            namespace: petclinic
            package: store
            interfaces: [event-store]

    # ── Vet Projector ──────────────────────────────────────────────────────────
    - name: vet-projector
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/vet-projector:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            target: keyvalue-nats
            namespace: wasi
            package: keyvalue
            interfaces: [store]
            target_config:
              - name: vet-projector-views-config
                properties:
                  bucket: petclinic-views
                  cluster_uri: "nats://nats.wasmcloud.svc.cluster.local:4222"

    # ── Query Handler ──────────────────────────────────────────────────────────
    - name: query-handler
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/query-handler:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 3
        - type: link
          properties:
            target: keyvalue-nats
            namespace: wasi
            package: keyvalue
            interfaces: [store]
            target_config:
              - name: query-handler-views-config
                properties:
                  bucket: petclinic-views
                  cluster_uri: "nats://nats.wasmcloud.svc.cluster.local:4222"

    # ── UI Server ──────────────────────────────────────────────────────────────
    - name: ui-server
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/petclinic/ui-server:latest
      traits:
        - type: spreadscaler
          properties:
            instances: 1

    # ── Capability Providers ───────────────────────────────────────────────────
    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.23.1
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: api-http
            target: api-gateway
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source_config:
              - name: api-http-config
                properties:
                  address: "0.0.0.0:8080"
        - type: link
          properties:
            name: ui-http
            target: ui-server
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source_config:
              - name: ui-http-config
                properties:
                  address: "0.0.0.0:8081"

    - name: keyvalue-nats
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-nats:0.3.1
      traits:
        - type: spreadscaler
          properties:
            instances: 1

    - name: messaging-nats
      type: capability
      properties:
        image: ghcr.io/wasmcloud/messaging-nats:0.23.1
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: owner-projector-sub
            target: owner-projector
            namespace: wasmcloud
            package: messaging
            interfaces: [handler]
            source_config:
              - name: owner-events-sub
                properties:
                  subscriptions: "petclinic.events.owner.>"
        - type: link
          properties:
            name: vet-projector-sub
            target: vet-projector
            namespace: wasmcloud
            package: messaging
            interfaces: [handler]
            source_config:
              - name: vet-events-sub
                properties:
                  subscriptions: "petclinic.events.vet.>"
