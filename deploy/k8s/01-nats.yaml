apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: petclinic
  labels:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/name: nats
data:
  nats.conf: |
    {
      "http_port": 8222,
      "jetstream": {
        "domain": "default",
        "max_file_store": 10737418240,
        "max_memory_store": 0,
        "store_dir": "/data"
      },
      "lame_duck_duration": "30s",
      "lame_duck_grace_period": "10s",
      "leafnodes": {
        "no_advertise": true,
        "port": 7422
      },
      "pid_file": "/var/run/nats/nats.pid",
      "port": 4222,
      "server_name": $SERVER_NAME
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: petclinic
  labels:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/name: nats
spec:
  selector:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: leafnode
      port: 7422
      targetPort: 7422
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: petclinic
  labels:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/name: nats
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: leafnode
      port: 7422
      targetPort: 7422
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: petclinic
  labels:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/name: nats
spec:
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/component: nats
      app.kubernetes.io/instance: nats
      app.kubernetes.io/name: nats
  serviceName: nats-headless
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nats
        app.kubernetes.io/instance: nats
        app.kubernetes.io/name: nats
    spec:
      containers:
        - name: nats
          image: nats:2.12.6-alpine
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SERVER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          args:
            - --config
            - /etc/nats-config/nats.conf
            - --server_name
            - $(POD_NAME)
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 7422
              name: leafnode
            - containerPort: 8222
              name: monitor
          volumeMounts:
            - name: config
              mountPath: /etc/nats-config
            - name: pid
              mountPath: /var/run/nats
            - name: data
              mountPath: /data
        - name: reloader
          image: natsio/nats-server-config-reloader:0.21.1
          args:
            - -pid
            - /var/run/nats/nats.pid
            - -config
            - /etc/nats-config/nats.conf
          volumeMounts:
            - name: config
              mountPath: /etc/nats-config
            - name: pid
              mountPath: /var/run/nats
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: pid
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
